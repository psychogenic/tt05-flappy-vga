# Tiny Tapeout project information
project:

  author:       "Daniel Robinson"      # Your name
  title:        "Flappy VGA"      # Project title
  language:     "Verilog" # other examples include Verilog, Amaranth, VHDL, etc
  description:  "A simple flappy bird clone with a button input and 640x480 VGA output. 25MHz clock required."      # Short description of what your project does
  language:     "Verilog"                             # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25179000                                     # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2
  source_files:        
    - tt_um_flappy_vga_cutout1.v
    - vgaControl.v
    - bitGen.v
    - gameControl.v
  top_module:  "tt_um_flappy_vga_cutout1"  

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Button"
  ui[1]: "none"
  ui[2]: "none"
  ui[3]: "none"
  ui[4]: "none"
  ui[5]: "none"
  ui[6]: "none"
  ui[7]: "none"

  # Outputs
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "vsync"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "hsync"
  

  # Bidirectional pins
  uio[0]: "score[0]"
  uio[1]: "score[1]"
  uio[2]: "score[2]"
  uio[3]: "score[3]"
  uio[4]: "score[4]"
  uio[5]: "score[5]"
  uio[6]: "score[6]"
  uio[7]: "score[7]"

# Do not change!
yaml_version: 6
